<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>김현능 - 프론트엔드 개발자 포트폴리오</title>
    <meta name="description" content="React와 Phaser.js로 만든 게임형 인터랙티브 포트폴리오" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // 테마 CSS가 적용되기 전 깜빡임(FOUC)을 막기 위해 React 렌더링보다 먼저 data-theme을 설정한다.
      // 키 이름은 src/theme/theme.ts의 THEME_STORAGE_KEY와 반드시 동일하게 유지할 것.
      (function () {
        try {
          var stored = localStorage.getItem("portfolio_theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
          document.title =
            (theme === "dark" ? "🌙 Pixel Garden Night" : "☀️ Pixel Garden") +
            " | " +
            document.title;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
